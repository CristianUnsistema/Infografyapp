<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Infografías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#1f2937] text-white font-['Montserrat',sans-serif] min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-[#111827] rounded-2xl p-8 shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-bold text-center text-[#019cde] mb-2">Generador de Infografías</h1>
        <p class="text-gray-400 text-center text-sm mb-8">Sube tu archivo datos.csv junto con las imágenes para generar los formatos PNG y PDF automáticamente.</p>
        
        <form id="uploadForm" class="space-y-6">
            <div class="border-2 border-dashed border-gray-700 rounded-xl p-6 text-center hover:border-[#019cde] transition-colors relative bg-[#1f2937]/50">
                <input type="file" id="csvFile" name="csvFile" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required>
                <svg class="w-10 h-10 text-gray-500 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
                <span id="fileName" class="text-sm text-gray-400 block font-medium">1. Selecciona tu archivo CSV</span>
            </div>

            <div class="border-2 border-dashed border-gray-700 rounded-xl p-6 text-center hover:border-[#019cde] transition-colors relative bg-[#1f2937]/50">
                <input type="file" id="images" name="images" accept="image/*" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <svg class="w-10 h-10 text-gray-500 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
                </svg>
                <span id="imageNames" class="text-sm text-gray-400 block font-medium">2. Selecciona las imágenes (opcional)</span>
            </div>

            <button type="submit" class="w-full py-3 bg-[#019cde] hover:bg-[#0086c2] text-white font-bold rounded-xl shadow-lg transition-colors flex items-center justify-center gap-3">
                Generar Lote
            </button>
        </form>

        <div id="loading" class="hidden mt-8 text-center space-y-3">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-[#019cde] mx-auto"></div>
            <p class="text-sm text-gray-400">Instanciando navegador headless y renderizando elementos...</p>
        </div>

        <div id="results" class="hidden mt-8 space-y-4">
            <h2 class="text-xl font-bold text-gray-200 border-b border-gray-800 pb-2">Archivos Generados</h2>
            <div id="filesList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const csvInput = document.getElementById('csvFile');
        const imagesInput = document.getElementById('images');
        const fileNameSpan = document.getElementById('fileName');
        const imageNamesSpan = document.getElementById('imageNames');
        const form = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const filesList = document.getElementById('filesList');

        csvInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                fileNameSpan.textContent = e.target.files[0].name;
                fileNameSpan.classList.remove('text-gray-400');
                fileNameSpan.classList.add('text-[#019cde]');
            }
        });

        imagesInput.addEventListener('change', (e) => {
            const count = e.target.files.length;
            if(count > 0) {
                imageNamesSpan.textContent = count === 1 ? e.target.files[0].name : count + ' imágenes seleccionadas';
                imageNamesSpan.classList.remove('text-gray-400');
                imageNamesSpan.classList.add('text-[#019cde]');
            } else {
                imageNamesSpan.textContent = '2. Selecciona las imágenes (opcional)';
                imageNamesSpan.classList.add('text-gray-400');
                imageNamesSpan.classList.remove('text-[#019cde]');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loading.classList.remove('hidden');
            results.classList.add('hidden');
            filesList.innerHTML = '';

            const formData = new FormData();
            formData.append('csvFile', csvInput.files[0]);
            
            for (let i = 0; i < imagesInput.files.length; i++) {
                formData.append('images', imagesInput.files[i]);
            }

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                loading.classList.add('hidden');

                if (data.success) {
                    results.classList.remove('hidden');
                    data.files.forEach(file => {
                        const item = document.createElement('div');
                        item.className = 'flex items-center justify-between p-4 bg-[#1f2937] rounded-xl border border-gray-800';
                        item.innerHTML = `
                            <span class="font-semibold text-sm text-gray-300 uppercase tracking-wide">${file.servicio}</span>
                            <div class="flex gap-2">
                                <a href="${file.png}" download class="px-3 py-1.5 bg-gray-800 hover:bg-gray-700 text-xs font-bold rounded-lg border border-gray-700 transition-colors">PNG</a>
                                <a href="${file.pdf}" download class="px-3 py-1.5 bg-[#019cde] hover:bg-[#0086c2] text-xs font-bold rounded-lg transition-colors">PDF</a>
                            </div>
                        `;
                        filesList.appendChild(item);
                    });
                } else {
                    alert('Error al generar: ' + data.error);
                }
            } catch (error) {
                loading.classList.add('hidden');
                alert('Error de red al conectar con el servidor.');
            }
        });
    </script>
</body>
</html>
